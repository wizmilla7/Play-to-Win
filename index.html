
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAST KENO · 20/80</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0d1117;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .keno-container {
      max-width: 820px;
      width: 100%;
      background: linear-gradient(145deg, #161b22, #0d1117);
      border-radius: 40px;
      padding: 24px 22px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px #2d333b;
      color: #f0f6fc;
    }
    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .game-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f9d976, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .bet-area {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1c2128;
      padding: 8px 18px 8px 14px;
      border-radius: 60px;
      border: 1px solid #30363d;
    }
    .bet-area span {
      font-weight: 600;
      color: #8b949e;
      font-size: 14px;
    }
    .bet-area .currency {
      color: #f0e6d0;
      font-weight: 700;
      font-size: 18px;
    }
    .bet-input {
      background: transparent;
      border: none;
      width: 70px;
      font-size: 20px;
      font-weight: 700;
      color: #f0f6fc;
      outline: none;
      text-align: right;
    }
    .bet-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .id-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      color: #8b949e;
      font-size: 15px;
      font-weight: 500;
      border-bottom: 1px solid #21262d;
      padding-bottom: 10px;
    }
    .id-row strong {
      color: #c9d1d9;
    }
    /* numbers grid */
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      margin: 18px 0 22px;
    }
    .num-btn {
      background: #1c2128;
      border: none;
      border-radius: 14px;
      padding: 10px 0;
      font-size: 20px;
      font-weight: 700;
      color: #c9d1d9;
      box-shadow: inset 0 -3px 0 #2d333b;
      transition: all 0.08s ease;
      cursor: pointer;
      text-align: center;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #30363d;
    }
    .num-btn:hover {
      background: #2d333b;
      color: #f0f6fc;
    }
    .num-btn.selected {
      background: #f1c40f;
      color: #0d1117;
      border-color: #f1c40f;
      box-shadow: 0 0 12px rgba(241, 196, 15, 0.5);
    }
    .num-btn.winning {
      background: #2ecc71;
      color: #0d1117;
      border-color: #2ecc71;
      box-shadow: 0 0 16px #2ecc71aa;
    }
    .num-btn.losing {
      background: #4a4f57;
      color: #7a828e;
      border-color: #3d434b;
    }
    .num-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    /* action row */
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin: 6px 0 16px;
    }
    .multiplier-badge {
      background: #21262d;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 18px;
      color: #f0e6d0;
      border: 1px solid #f1c40f55;
    }
    .multiplier-badge i {
      color: #f1c40f;
      margin-right: 6px;
    }
    .btn-primary {
      background: #f1c40f;
      border: none;
      padding: 12px 36px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 20px;
      color: #0d1117;
      box-shadow: 0 6px 0 #b7950b;
      transition: 0.08s ease;
      cursor: pointer;
      letter-spacing: 0.5px;
      flex: 1 1 auto;
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b7950b;
    }
    .btn-primary:disabled {
      opacity: 0.5;
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b7950b;
      pointer-events: none;
    }
    .btn-secondary {
      background: #21262d;
      border: 1px solid #30363d;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: #c9d1d9;
      cursor: pointer;
      transition: 0.1s;
    }
    .btn-secondary:hover {
      background: #30363d;
    }
    /* history & stats */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 8px;
      border-top: 1px solid #21262d;
      padding-top: 16px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .bottom-bar a {
      color: #8b949e;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 30px;
      transition: 0.1s;
      font-size: 14px;
    }
    .bottom-bar a:hover {
      background: #1c2128;
      color: #f0f6fc;
    }
    .bottom-bar a i {
      margin-right: 6px;
    }
    .result-message {
      font-weight: 600;
      font-size: 18px;
      padding: 6px 0;
      min-height: 40px;
    }
    /* Admin / user panel */
    .auth-panel {
      background: #161b22;
      border-radius: 24px;
      padding: 16px 20px;
      margin-top: 20px;
      border: 1px solid #2d333b;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 20px;
      align-items: center;
      justify-content: space-between;
    }
    .auth-panel .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .auth-panel .user-info i {
      font-size: 24px;
      color: #f1c40f;
    }
    .auth-panel .user-info span {
      font-weight: 600;
    }
    .auth-panel .user-info .badge {
      background: #1f6feb;
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700;
      color: white;
    }
    .auth-panel .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .auth-panel .admin-actions button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      font-size: 13px;
    }
    .auth-panel .admin-actions button:hover {
      background: #30363d;
    }
    .auth-panel .admin-actions .approve {
      background: #2ecc71;
      border-color: #2ecc71;
      color: #0d1117;
    }
    .auth-panel .admin-actions .reject {
      background: #e74c3c;
      border-color: #e74c3c;
      color: white;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1c2128;
      max-width: 420px;
      width: 90%;
      padding: 28px 24px;
      border-radius: 32px;
      border: 1px solid #30363d;
      box-shadow: 0 30px 50px #00000099;
    }
    .modal-content h3 {
      margin-bottom: 16px;
      color: #f0f6fc;
    }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 40px;
      color: #f0f6fc;
      font-size: 15px;
    }
    .modal-content .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      justify-content: flex-end;
    }
    .modal-content .modal-actions button {
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn-close-modal {
      background: #30363d;
      color: #c9d1d9;
    }
    .btn-save {
      background: #f1c40f;
      color: #0d1117;
    }
    .flex-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .text-muted {
      color: #8b949e;
      font-size: 13px;
    }
    @media (max-width: 600px) {
      .numbers-grid { gap: 5px; }
      .num-btn { font-size: 16px; }
      .btn-primary { padding: 10px 20px; font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="keno-container" id="app">

  <!-- Header -->
  <div class="header">
    <div class="game-title"><i class="fas fa-dice"></i> FAST KENO</div>
    <div class="bet-area">
      <span><i class="fas fa-coins"></i> BET</span>
      <input type="number" class="bet-input" id="betAmount" value="1" min="1" step="1">
      <span class="currency">ETB</span>
    </div>
  </div>

  <!-- ID & status -->
  <div class="id-row">
    <span><strong>ID:</strong> <span id="userIdDisplay">884650418</span></span>
    <span><i class="far fa-clock"></i> 20/80 · <span id="drawCount">0</span></span>
  </div>

  <!-- Number grid 1-80 -->
  <div class="numbers-grid" id="numberGrid"></div>

  <!-- Action row -->
  <div class="action-row">
    <div class="multiplier-badge"><i class="fas fa-bolt"></i> X2 MAX</div>
    <button class="btn-primary" id="playBtn"><i class="fas fa-play"></i> PLAY</button>
    <button class="btn-secondary" id="clearBtn"><i class="fas fa-undo-alt"></i> Clear</button>
  </div>

  <!-- result message -->
  <div class="result-message" id="resultMessage">Pick 10 numbers & play</div>

  <!-- bottom links -->
  <div class="bottom-bar">
    <a href="#" id="gameLink"><i class="fas fa-gamepad"></i> GAME</a>
    <a href="#" id="historyLink"><i class="fas fa-history"></i> HISTORY</a>
    <a href="#" id="resultsLink"><i class="fas fa-chart-bar"></i> RESULTS</a>
    <a href="#" id="statsLink"><i class="fas fa-cog"></i> STATISTI</a>
  </div>

  <!-- Auth / Admin panel -->
  <div class="auth-panel" id="authPanel">
    <div class="user-info">
      <i class="fas fa-user-circle"></i>
      <span id="usernameDisplay">Player</span>
      <span class="badge" id="roleBadge">USER</span>
    </div>
    <div class="admin-actions" id="adminActions">
      <button id="changePwBtn"><i class="fas fa-key"></i> Change PW</button>
      <button id="adminDepositBtn" class="approve"><i class="fas fa-plus-circle"></i> Approve Dep.</button>
      <button id="adminWithdrawBtn" class="reject"><i class="fas fa-minus-circle"></i> Approve With.</button>
      <button id="adminResetPwBtn"><i class="fas fa-user-lock"></i> Reset PW</button>
    </div>
    <div>
      <button id="loginToggleBtn" class="btn-secondary" style="padding:4px 16px;"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>
  </div>
</div>

<!-- MODAL for login / admin actions -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Login</h3>
    <div id="modalBody">
      <input type="text" id="modalInput1" placeholder="Username">
      <input type="password" id="modalInput2" placeholder="Password">
      <div class="modal-actions">
        <button class="btn-close-modal" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- STATE ----------
    const state = {
      // user
      currentUser: 'Player',
      role: 'user',        // 'user' or 'admin'
      password: 'player123',
      // keno
      selected: new Set(),
      bet: 1,
      balance: 500,
      drawn: [],
      history: [],
      gameCount: 0,
      // admin data
      users: {
        'admin': { password: 'admin123', role: 'admin', balance: 9999 },
        'Player': { password: 'player123', role: 'user', balance: 500 },
        'demo': { password: 'demo123', role: 'user', balance: 200 }
      }
    };

    // DOM refs
    const grid = document.getElementById('numberGrid');
    const playBtn = document.getElementById('playBtn');
    const clearBtn = document.getElementById('clearBtn');
    const betInput = document.getElementById('betAmount');
    const resultMsg = document.getElementById('resultMessage');
    const userIdDisplay = document.getElementById('userIdDisplay');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const roleBadge = document.getElementById('roleBadge');
    const drawCountSpan = document.getElementById('drawCount');

    // modal
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalInput1 = document.getElementById('modalInput1');
    const modalInput2 = document.getElementById('modalInput2');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalCancel = document.getElementById('modalCancel');

    // admin buttons
    const changePwBtn = document.getElementById('changePwBtn');
    const adminDepositBtn = document.getElementById('adminDepositBtn');
    const adminWithdrawBtn = document.getElementById('adminWithdrawBtn');
    const adminResetPwBtn = document.getElementById('adminResetPwBtn');
    const loginToggleBtn = document.getElementById('loginToggleBtn');

    // ---------- HELPERS ----------
    function renderGrid() {
      grid.innerHTML = '';
      for (let i = 1; i <= 80; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.textContent = i;
        btn.dataset.value = i;
        if (state.selected.has(i)) btn.classList.add('selected');
        if (state.drawn.includes(i)) {
          btn.classList.add('winning');
        } else if (state.drawn.length > 0 && !state.drawn.includes(i) && state.selected.has(i)) {
          btn.classList.add('losing');
        }
        btn.addEventListener('click', () => toggleNumber(i));
        grid.appendChild(btn);
      }
    }

    function toggleNumber(num) {
      if (state.drawn.length > 0) return; // lock after draw
      if (state.selected.has(num)) {
        state.selected.delete(num);
      } else {
        if (state.selected.size >= 10) {
          resultMsg.innerText = '⚠️ Maximum 10 numbers';
          return;
        }
        state.selected.add(num);
      }
      renderGrid();
      updateUI();
    }

    function updateUI() {
      userIdDisplay.textContent = '884650418'; // static for demo
      usernameDisplay.textContent = state.currentUser;
      roleBadge.textContent = state.role.toUpperCase();
      drawCountSpan.textContent = state.gameCount;
      const bet = parseInt(betInput.value) || 1;
      state.bet = Math.max(1, bet);
      // show admin buttons only if admin
      const adminBtns = document.querySelectorAll('.admin-actions button');
      adminBtns.forEach(b => b.style.display = (state.role === 'admin') ? 'inline-block' : 'none');
    }

    // ---------- PLAY KENO 20/80 ----------
    function playKeno() {
      if (state.selected.size !== 10) {
        resultMsg.innerText = '❌ Pick exactly 10 numbers';
        return;
      }
      // draw 20 numbers from 1..80
      const pool = Array.from({ length: 80 }, (_, i) => i + 1);
      const drawn = [];
      for (let i = 0; i < 20; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        drawn.push(pool[idx]);
        pool.splice(idx, 1);
      }
      state.drawn = drawn;
      const selectedArr = Array.from(state.selected);
      const matches = selectedArr.filter(n => drawn.includes(n)).length;
      // Payout: X2 max multiplier (just for fun)
      const bet = parseInt(betInput.value) || 1;
      const winAmount = matches * bet * 2; 
      let msg = `🎯 ${matches} matches! `;
      if (winAmount > 0) {
        msg += `+${winAmount} ETB`;
        state.balance += winAmount;
      } else {
        msg += `😞 No win this time.`;
        state.balance -= bet;
      }
      resultMsg.innerText = msg;
      state.gameCount++;
      // save history
      state.history.push({ selected: [...selectedArr], drawn, matches, bet, win: winAmount });
      renderGrid();
      updateUI();
      // enable clear to reset board
    }

    function clearBoard() {
      if (state.drawn.length > 0) {
        state.drawn = [];
        state.selected.clear();
        renderGrid();
        resultMsg.innerText = '✨ Clear board. Pick 10 numbers.';
        updateUI();
      } else {
        state.selected.clear();
        renderGrid();
        resultMsg.innerText = '🧹 Selections cleared.';
        updateUI();
      }
    }

    // ---------- MODAL LOGIC ----------
    let modalResolve = null;
    function showModal(title, input1Label, input2Label, isPassword = true) {
      return new Promise((resolve) => {
        modalTitle.textContent = title;
        modalInput1.placeholder = input1Label || 'Username';
        modalInput2.placeholder = input2Label || 'Password';
        modalInput2.type = isPassword ? 'password' : 'text';
        modalInput1.value = '';
        modalInput2.value = '';
        modal.classList.add('active');
        modalResolve = resolve;
      });
    }

    function closeModal() {
      modal.classList.remove('active');
      if (modalResolve) modalResolve(null);
      modalResolve = null;
    }

    modalConfirm.addEventListener('click', () => {
      const val1 = modalInput1.value.trim();
      const val2 = modalInput2.value.trim();
      if (modalResolve) modalResolve({ val1, val2 });
      closeModal();
    });
    modalCancel.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ---------- AUTH / ADMIN ----------
    async function loginFlow() {
      const res = await showModal('Login', 'Username', 'Password');
      if (!res) return;
      const { val1, val2 } = res;
      if (!val1 || !val2) { resultMsg.innerText = '❌ Invalid credentials'; return; }
      const user = state.users[val1];
      if (user && user.password === val2) {
        state.currentUser = val1;
        state.role = user.role || 'user';
        state.balance = user.balance || 100;
        resultMsg.innerText = `✅ Logged in as ${val1} (${state.role})`;
        updateUI();
        renderGrid();
      } else {
        resultMsg.innerText = '❌ Wrong username or password';
      }
    }

    // change password (user)
    async function changePassword() {
      if (state.currentUser === 'Guest') { resultMsg.innerText = '❌ Login first'; return; }
      const res = await showModal('Change Password', 'New Password', 'Confirm Password');
      if (!res) return;
      const { val1, val2 } = res;
      if (!val1 || val1.length < 4) { resultMsg.innerText = '❌ Password too short'; return; }
      if (val1 !== val2) { resultMsg.innerText = '❌ Passwords do not match'; return; }
      const user = state.users[state.currentUser];
      if (user) {
        user.password = val1;
        state.password = val1;
        resultMsg.innerText = '✅ Password updated successfully';
      } else {
        resultMsg.innerText = '❌ User not found';
      }
    }

    // Admin: reset user password
    async function adminResetPassword() {
      if (state.role !== 'admin') { resultMsg.innerText = '⛔ Admin only'; return; }
      const res = await showModal('Reset User Password', 'Username to reset', 'New password');
      if (!res) return;
      const { val1, val2 } = res;
      if (!val1 || !val2) { resultMsg.innerText = '❌ Provide username and new password'; return; }
      const user = state.users[val1];
      if (!user) { resultMsg.innerText = '❌ User not found'; return; }
      user.password = val2;
      resultMsg.innerText = `✅ Password for ${val1} reset to ${val2}`;
    }

    // Admin approve deposit (mock)
    async function adminApproveDeposit() {
      if (state.role !== 'admin') { resultMsg.innerText = '⛔ Admin only'; return; }
      const res = await showModal('Approve Deposit', 'Username', 'Amount (ETB)');
      if (!res) return;
      const { val1, val2 } = res;
      const amount = parseInt(val2);
      if (!val1 || isNaN(amount) || amount <= 0) { resultMsg.innerText = '❌ Invalid input'; return; }
      const user = state.users[val1];
      if (!user) { resultMsg.innerText = '❌ User not found'; return; }
      user.balance = (user.balance || 0) + amount;
      if (state.currentUser === val1) state.balance = user.balance;
      resultMsg.innerText = `✅ Deposited ${amount} ETB to ${val1}`;
      updateUI();
    }

    async function adminApproveWithdraw() {
      if (state.role !== 'admin') { resultMsg.innerText = '⛔ Admin only'; return; }
      const res = await showModal('Approve Withdrawal', 'Username', 'Amount (ETB)');
      if (!res) return;
      const { val1, val2 } = res;
      const amount = parseInt(val2);
      if (!val1 || isNaN(amount) || amount <= 0) { resultMsg.innerText = '❌ Invalid input'; return; }
      const user = state.users[val1];
      if (!user) { resultMsg.innerText = '❌ User not found'; return; }
      if ((user.balance || 0) < amount) { resultMsg.innerText = '❌ Insufficient balance'; return; }
      user.balance -= amount;
      if (state.currentUser === val1) state.balance = user.balance;
      resultMsg.innerText = `✅ Withdrew ${amount} ETB from ${val1}`;
      updateUI();
    }

    // ---------- EVENT LISTENERS ----------
    playBtn.addEventListener('click', playKeno);
    clearBtn.addEventListener('click', clearBoard);
    loginToggleBtn.addEventListener('click', loginFlow);
    changePwBtn.addEventListener('click', changePassword);
    adminResetPwBtn.addEventListener('click', adminResetPassword);
    adminDepositBtn.addEventListener('click', adminApproveDeposit);
    adminWithdrawBtn.addEventListener('click', adminApproveWithdraw);

    // bottom links (all work)
    document.getElementById('gameLink').addEventListener('click', (e) => { e.preventDefault(); resultMsg.innerText = '🎮 GAME · Fast Keno 20/80'; });
    document.getElementById('historyLink').addEventListener('click', (e) => { e.preventDefault(); resultMsg.innerText = `📜 HISTORY: ${state.history.length} games played`; });
    document.getElementById('resultsLink').addEventListener('click', (e) => { e.preventDefault(); resultMsg.innerText = `📊 RESULTS: last draw ${state.drawn.length > 0 ? state.drawn.join(',') : '—'}`; });
    document.getElementById('statsLink').addEventListener('click', (e) => { e.preventDefault(); resultMsg.innerText = `📈 STATS: balance ${state.balance} ETB · games ${state.gameCount}`; });

    // init
    renderGrid();
    updateUI();
    // default admin credentials
