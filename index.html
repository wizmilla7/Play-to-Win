<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎰 Multi‑Game Platform</title>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(145deg, #111128, #0d0d22);
            border-radius: 24px;
            padding: 12px 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7e05e, #d4a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .nav-links button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-links button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .nav-links button.active {
            background: rgba(255, 215, 0, 0.12);
            color: #f7e05e;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .user-area .balance {
            font-size: 14px;
            font-weight: 700;
            color: #f7e05e;
        }

        .user-area .btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #fff;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .user-area .btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .user-area .btn-logout {
            color: #ff6b6b;
        }
        .user-area .btn-change-pw {
            color: #f7e05e;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ── KENO ── */
        .keno-wrapper {
            background: #0f0f2a;
            border-radius: 14px;
            padding: 12px 12px 16px;
        }

        /* ── Winning Numbers Banner ── */
        .winning-banner {
            display: none;
            background: linear-gradient(135deg, rgba(0, 230, 118, 0.06), rgba(0, 200, 80, 0.02));
            border: 1px solid rgba(0, 230, 118, 0.12);
            border-radius: 10px;
            padding: 3px 8px;
            margin-bottom: 8px;
            align-items: center;
            flex-wrap: nowrap;
            gap: 3px 8px;
            min-height: 26px;
        }
        .winning-banner.visible {
            display: flex;
        }
        .winning-banner .label {
            font-size: 9px;
            font-weight: 700;
            color: #00e676;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .winning-banner .balls {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 3px;
            align-items: center;
            flex: 1 1 auto;
            padding: 1px 0;
        }
        .winning-banner .ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #0b0b1a;
            border-radius: 50%;
            font-weight: 700;
            font-size: 8px;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.15);
            padding: 0 1px;
            animation: popIn 0.25s ease forwards, blinkWin 0.8s ease 4;
            opacity: 0;
            transform: scale(0.4);
            flex-shrink: 0;
            transition: all 0.15s;
            line-height: 1;
        }
        .winning-banner .ball.matched {
            background: linear-gradient(135deg, #f7e05e, #d4a800);
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.35);
            border: 1.5px solid #f7e05e;
            transform: scale(1.05);
            min-width: 20px;
            height: 20px;
            font-size: 9px;
            animation: popIn 0.25s ease forwards, blinkWinGold 0.8s ease 4;
        }
        .winning-banner .ball.revealing {
            animation: popIn 0.25s ease forwards, blinkWin 0.8s ease 4;
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-6deg);
            }
            60% {
                transform: scale(1.1) rotate(2deg);
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }
        @keyframes blinkWin {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 8px rgba(0, 230, 118, 0.15);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.85);
                box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            }
        }
        @keyframes blinkWinGold {
            0%,
            100% {
                opacity: 1;
                transform: scale(1.05);
                box-shadow: 0 0 16px rgba(255, 215, 0, 0.35);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.9);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            }
        }

        .winning-banner .status-text {
            font-size: 8px;
            opacity: 0.4;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: auto;
        }

        .keno-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .keno-title {
            font-size: 20px;
            font-weight: 800;
            color: #f7e05e;
            letter-spacing: 0.3px;
        }

        .keno-sub {
            font-size: 11px;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        .keno-grid-wrap {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 8px 4px;
            margin-bottom: 10px;
            position: relative;
        }

        .keno-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
        }

        .keno-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.1s;
            border: 1px solid rgba(255, 255, 255, 0.04);
            user-select: none;
            font-variant-numeric: tabular-nums;
            min-height: 28px;
        }

        .keno-cell:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .keno-cell.selected {
            background: linear-gradient(135deg, #f7e05e, #d4a800);
            color: #0b0b1a !important;
            border-color: #f7e05e;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
            transform: scale(1.02);
        }
        .keno-cell.drawn {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.25) !important;
            cursor: default;
            border-color: rgba(255, 255, 255, 0.02);
        }
        .keno-cell.matched {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #0b0b1a !important;
            border-color: #00e676;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
            transform: scale(1.04);
        }
        .keno-cell.winning {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #0b0b1a !important;
            border-color: #00e676;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            transform: scale(1.06);
        }

        /* Hot & Cold text colors */
        .keno-cell.hot {
            color: #ff4444 !important;
            font-weight: 700;
        }
        .keno-cell.cold {
            color: #4488ff !important;
            font-weight: 700;
        }
        .keno-cell.selected.hot,
        .keno-cell.selected.cold,
        .keno-cell.matched.hot,
        .keno-cell.matched.cold,
        .keno-cell.winning.hot,
        .keno-cell.winning.cold,
        .keno-cell.drawn.hot,
        .keno-cell.drawn.cold {
            color: inherit !important;
        }
        .keno-cell.drawn.hot,
        .keno-cell.drawn.cold {
            color: rgba(255, 255, 255, 0.25) !important;
        }
        .keno-cell.selected.hot,
        .keno-cell.selected.cold {
            color: #0b0b1a !important;
        }

        .keno-controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .keno-bet-area {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 10px 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .keno-bet-area label {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .keno-bet-area input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 3px 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            width: 60px;
            font-family: inherit;
            outline: none;
        }
        .keno-bet-area input:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .keno-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .keno-actions .btn {
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
        }

        .keno-pick-count {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.4;
            margin-left: auto;
        }
        .keno-pick-count strong {
            color: #f7e05e;
            opacity: 1;
        }

        .keno-draw-row {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }
        .keno-draw-btn {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 40px;
            background: linear-gradient(135deg, #f7e05e, #d4a800);
            color: #0b0b1a;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }
        .keno-draw-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }
        .keno-draw-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .keno-tabs {
            display: flex;
            gap: 2px;
            margin: 8px 0 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 6px;
            flex-wrap: wrap;
        }
        .keno-tabs button {
            background: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .keno-tabs button:hover {
            color: rgba(255, 255, 255, 0.6);
        }
        .keno-tabs button.active {
            background: rgba(255, 215, 0, 0.08);
            color: #f7e05e;
        }

        .tab-panel {
            display: none;
            padding: 4px 0;
            min-height: 40px;
        }
        .tab-panel.active {
            display: block;
        }
        .tab-panel .empty {
            opacity: 0.3;
            font-size: 12px;
        }

        .keno-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            padding: 4px 0 6px 0;
            font-size: 11px;
            font-weight: 500;
        }
        .keno-stats .stat-item {
            opacity: 0.5;
        }
        .keno-stats .stat-item strong {
            color: #fff;
            opacity: 1;
            font-weight: 700;
        }
        .keno-stats .stat-item.highlight {
            opacity: 1;
            color: #f7e05e;
        }
        .keno-stats .stat-item.highlight strong {
            color: #f7e05e;
        }

        .keno-result {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            min-height: 34px;
            margin-top: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .keno-result .empty {
            opacity: 0.3;
        }
        .keno-result .win-badge {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .keno-result .lose-badge {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            padding: 2px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 12px;
        }
        .keno-result .match-nums {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }
        .keno-result .match-nums span {
            background: rgba(255, 215, 0, 0.08);
            padding: 0 6px;
            border-radius: 10px;
            font-weight: 600;
            color: #f7e05e;
            font-size: 12px;
        }

        .keno-players {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .keno-players h4 {
            font-size: 11px;
            opacity: 0.5;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .keno-players .player-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 10px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 12px;
        }
        .keno-players .player-row:last-child {
            border-bottom: none;
        }
        .keno-players .player-name {
            font-weight: 600;
            color: #f7e05e;
            min-width: 60px;
            font-size: 12px;
        }
        .keno-players .player-numbers {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .keno-players .player-numbers span {
            background: rgba(255, 255, 255, 0.06);
            padding: 0 4px;
            border-radius: 3px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
        .keno-players .player-bet {
            opacity: 0.4;
            font-size: 10px;
            margin-left: auto;
        }

        /* ── History / Results / Stats ── */
        .history-entry {
            padding: 5px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
            align-items: center;
            font-size: 11px;
        }
        .history-entry:last-child {
            border-bottom: none;
        }
        .history-entry .round {
            font-weight: 600;
            color: #f7e05e;
            min-width: 50px;
            font-size: 11px;
        }
        .history-entry .numbers {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .history-entry .numbers span {
            background: rgba(0, 230, 118, 0.08);
            padding: 0 5px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            color: #00e676;
            min-width: 18px;
            text-align: center;
        }
        .history-entry .info {
            opacity: 0.3;
            font-size: 9px;
            margin-left: auto;
        }
        .history-entry .winners {
            color: #f7e05e;
            font-weight: 600;
            font-size: 10px;
        }

        /* Results tab */
        .results-round-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            padding: 6px 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .results-round-header .r-title {
            font-weight: 600;
            color: #f7e05e;
            font-size: 12px;
        }
        .results-round-header .r-time {
            opacity: 0.3;
            font-size: 10px;
        }
        .results-winning-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 3px;
            padding: 3px 0 6px 0;
        }
        .results-winning-numbers .wnum {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            background: rgba(0, 230, 118, 0.08);
            border-radius: 50%;
            font-size: 8px;
            font-weight: 700;
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.08);
            padding: 0 1px;
            flex-shrink: 0;
        }
        .results-players {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 2px;
        }
        .results-players .rp-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 10px;
            padding: 3px 6px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 5px;
            font-size: 11px;
        }
        .results-players .rp-row .rp-name {
            font-weight: 600;
            color: #f7e05e;
            min-width: 50px;
            font-size: 11px;
        }
        .results-players .rp-row .rp-matches {
            opacity: 0.5;
            font-size: 10px;
        }
        .results-players .rp-row .rp-win {
            font-weight: 700;
            font-size: 11px;
            margin-left: auto;
        }
        .results-players .rp-row .rp-win.positive {
            color: #00e676;
        }
        .results-players .rp-row .rp-win.zero {
            opacity: 0.2;
        }
        .results-summary {
            padding: 6px 8px;
            margin-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 10px;
            opacity: 0.4;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Statistics */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
            padding: 4px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 6px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stat-card .stat-value {
            font-size: 16px;
            font-weight: 800;
            color: #f7e05e;
        }
        .stat-card .stat-label {
            font-size: 8px;
            opacity: 0.4;
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .stat-card.green .stat-value {
            color: #00e676;
        }
        .stat-card.gold .stat-value {
            color: #f7e05e;
        }
        .stat-card.pink .stat-value {
            color: #ff6b6b;
        }

        /* Hot & Cold numbers in stats panel */
        .hot-cold-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-top: 8px;
            padding: 6px 0;
        }
        .hot-cold-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
        }
        .hot-cold-group .label {
            font-size: 10px;
            opacity: 0.5;
            margin-right: 4px;
            font-weight: 600;
        }
        .hot-cold-group .num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 11px;
            padding: 0 2px;
        }
        .hot-cold-group .num.hot {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .hot-cold-group .num.cold {
            background: rgba(0, 100, 255, 0.2);
            color: #4488ff;
            border: 1px solid #4488ff;
        }

        .top-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 4px 0;
        }
        .top-numbers .num-badge {
            background: rgba(255, 215, 0, 0.06);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 11px;
            color: #f7e05e;
